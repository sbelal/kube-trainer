apiVersion: batch/v1
kind: Job
metadata:
  name: hello-app-job
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 120
  template:
    metadata:
      labels:
        app: hello-app-job
    spec:
      restartPolicy: Never
      containers:
      - name: hello-job
        image: busybox:1.36
        command: ["sh", "-c"]
        args:
        - |
          echo "=== Job started at $(date) ==="
          echo "Running on host: $(hostname)"
          echo "Performing batch task..."
          sleep 5
          echo "=== Job completed successfully ==="
