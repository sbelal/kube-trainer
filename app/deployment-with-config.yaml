apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-app-configured
  labels:
    app: hello-app-configured
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hello-app-configured
  template:
    metadata:
      labels:
        app: hello-app-configured
    spec:
      containers:
      - name: hello-app
        image: kube-trainer-app:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 3000
        envFrom:
        - configMapRef:
            name: hello-app-config
        - secretRef:
            name: hello-app-secret
        volumeMounts:
        - name: app-data
          mountPath: /app/data
      volumes:
      - name: app-data
        persistentVolumeClaim:
          claimName: hello-app-pvc
